<!-- src/app/app.component.html -->
<div class="app-shell">

  <!-- ── Header ─────────────────────────────────── -->
  <header class="app-header">
    <div class="header-brand">
      <img class="header-logo" src="assets/logo.png" alt="04-RT" />
      <span class="header-title">RADIO NOISE MAP</span>
    </div>
    <div class="header-spacer"></div>
    <span class="header-time">{{ currentTime() }}</span>
    <button class="btn-export" (click)="exportGeoJson()">
      <span class="export-long">↓ EXPORT JSON</span>
      <span class="export-short">↓ JSON</span>
    </button>
    <button class="btn-export" (click)="exportCsv()">
      <span class="export-long">↓ EXPORT CSV</span>
      <span class="export-short">↓ CSV</span>
    </button>
  </header>

  <!-- ── Main: map + sidebar ────────────────────── -->
  <div class="main-area">

    <main class="map-area">
      <app-map></app-map>
    </main>

    <aside class="sidebar" [class.sidebar--collapsed]="sidebarCollapsed()">

      <!-- Drag handle (visible on mobile only) -->
      <div class="sidebar-handle" (click)="toggleSidebar()">
        <span class="handle-knob"></span>
        <span class="handle-label">{{ sidebarCollapsed() ? '▲ SOURCES' : '▼' }}</span>
      </div>

      <!-- Content -->
      <div class="sidebar-content">
        @if (uiState.formMode()) {
          <app-emission-form></app-emission-form>
        } @else {
          <div class="sidebar-list">
            <app-frequency-list></app-frequency-list>
          </div>
          <div class="sidebar-bottom">
            <app-frequency-detail></app-frequency-detail>
          </div>
        }
      </div>

    </aside>

  </div>

</div>
