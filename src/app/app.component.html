<!-- src/app/app.component.html -->
<div class="app-shell">

  <!-- ── Header ─────────────────────────────────── -->
  <header class="app-header">
    <div class="header-brand">
      <img class="header-logo" src="assets/logo.png" alt="04-RT" />
      <span class="header-title">RADIO NOISE MAP</span>
    </div>
    <div class="header-sep"></div>
    <span class="header-sub">Моніторинг РЕО</span>
    <div class="header-spacer"></div>
    <div class="header-status">
      <span class="status-dot"></span>
      <span class="status-text">LINK: SECURE</span>
    </div>
    <div class="header-sep"></div>
    <span class="header-time">{{ currentTime() }}</span>
    <div class="header-sep"></div>
    <button class="btn-export" (click)="exportGeoJson()">↓ EXPORT JSON</button>
    <button class="btn-export" (click)="exportCsv()">↓ EXPORT CSV</button>
  </header>

  <!-- ── Main: map + sidebar ────────────────────── -->
  <div class="main-area">

    <main class="map-area">
      <app-map></app-map>
    </main>

    <aside class="sidebar">
      @if (uiState.formMode()) {
        <app-emission-form></app-emission-form>
      } @else {
        <div class="sidebar-list">
          <app-frequency-list></app-frequency-list>
        </div>
        <div class="sidebar-bottom">
          <app-frequency-detail></app-frequency-detail>
        </div>
      }
    </aside>

  </div>

</div>
